<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AVE CRM LinkedIn Import</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>AVE CRM Import</h1>
      <p class="subtitle">LinkedIn naar Netwerkcontact</p>
    </header>

    <div id="setup-section" class="section">
      <h2>Instellingen</h2>
      <label for="crm-url">CRM URL</label>
      <input type="text" id="crm-url" placeholder="http://ave-consult-bv.localhost:8080" />
      <label for="api-token">API Token</label>
      <input type="password" id="api-token" placeholder="Bearer token uit CRM" />
      <button id="save-settings" class="btn btn-primary">Opslaan</button>
      <p class="hint">URL: backend-adres (poort 8080). Token: log in op CRM → F12 → Application → Local Storage → auth_token</p>
    </div>

    <div id="assignments-section" class="section" style="display: none;">
      <h2>Kies opdracht</h2>
      <select id="assignment-select">
        <option value="">Laden...</option>
      </select>
      <button id="import-btn" class="btn btn-primary" disabled>
        Importeer dit profiel
      </button>
      <div id="status" class="status"></div>
    </div>

    <div id="error-section" class="section error" style="display: none;">
      <p id="error-message"></p>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
